<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StudyFlow - Otimizador de Estudos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Modo Noite */
            --bg-main: #1a1a1b;
            --text-main: #e5e7eb;
            --bg-sidebar: #121213;
            --bg-controls: #2d2d2e;
            --border-color: #404041;
            --highlight-bg: #fbbf24;
            --highlight-text: #000;
            --card-bg: #262627;
        }

        .theme-day {
            /* Modo Dia */
            --bg-main: #f5f5dc; 
            --text-main: #2d2d2e; 
            --bg-sidebar: #ebebd0;
            --bg-controls: #e1e1c7;
            --border-color: #d1d1b5;
            --highlight-bg: #d97706;
            --highlight-text: #fff;
            --card-bg: #efefd5;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            overflow: hidden;
        }

        .app-container {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        
        .highlight {
            background-color: var(--highlight-bg);
            color: var(--highlight-text);
            border-radius: 4px;
            padding: 2px 4px;
        }

        .reader-container {
            width: 95%;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.6;
            font-size: 1.25rem; 
        }

        #topic-title {
            font-size: 2.2em;
            margin-bottom: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
        }

        #text-body {
            font-size: 1.1em;
        }

        .control-bar {
            background-color: var(--bg-controls);
            border-top: 1px solid var(--border-color);
            padding-bottom: calc(env(safe-area-inset-bottom) + 0.25rem);
            padding-top: 0.5rem;
        }

        .sidebar {
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding-top: env(safe-area-inset-top);
        }

        .quiz-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 2rem;
            margin-top: 2rem;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1rem;
            margin-top: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .correct { background-color: #10b981 !important; color: white !important; }
        .incorrect { background-color: #ef4444 !important; color: white !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        button:active { transform: scale(0.95); }

        .sentence-item {
            transition: background-color 0.2s ease;
            cursor: pointer;
            display: inline;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div class="app-container">
        <!-- Header: Título, Temas e Zoom -->
        <header class="p-4 flex flex-wrap justify-between items-center shrink-0 gap-4">
            <div class="flex items-center gap-4">
                <button id="menuBtn" class="p-2 bg-black/10 rounded-lg md:hidden">☰</button>
                <h1 class="text-xl font-bold text-amber-500 tracking-tighter">StudyFlow</h1>
            </div>

            <div class="flex items-center gap-2">
                <button onclick="setTheme('day')" class="px-3 py-2 bg-[#f5f5dc] text-[#2d2d2e] rounded-lg text-xs font-bold border border-black/10">☀️ Dia</button>
                <button onclick="setTheme('night')" class="px-3 py-2 bg-[#2d2d2e] text-[#e5e7eb] rounded-lg text-xs font-bold border border-white/10">🌙 Noite</button>
                <div class="w-px h-6 bg-zinc-600 mx-2 hidden sm:block"></div>
                <button onclick="changeZoom(-0.15)" class="px-4 py-2 bg-black/10 rounded-lg font-bold border border-zinc-500/30">A-</button>
                <button onclick="changeZoom(0.15)" class="px-4 py-2 bg-black/10 rounded-lg font-bold border border-zinc-500/30">A+</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar w-72 p-4 hidden md:block overflow-y-auto no-scrollbar">
                <h2 class="text-xs uppercase opacity-40 font-bold mb-4 tracking-widest text-zinc-500">Conteúdo</h2>
                <div id="module-list" class="space-y-4"></div>
            </aside>

            <!-- Main Reader -->
            <main class="flex-1 overflow-y-auto p-4 md:p-10 relative no-scrollbar" id="reader-scroll">
                <div class="reader-container" id="content-display">
                    
                    <div id="reading-area">
                        <h2 id="topic-title" class="border-l-4 border-amber-500 pl-4">Carregando...</h2>
                        <div id="text-body" class="space-y-6"></div>
                        
                        <div class="mt-12 flex justify-center">
                            <button id="startQuizBtn" class="bg-amber-500 text-black px-10 py-4 rounded-2xl font-black text-lg shadow-xl hover:scale-105 transition-all">
                                📝 TESTAR CONHECIMENTO (QUIZ)
                            </button>
                        </div>
                    </div>

                    <div id="quiz-area" class="hidden">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-extrabold">Simulado</h2>
                            <button onclick="exitQuiz()" class="text-sm opacity-60 hover:opacity-100 underline">Voltar para leitura</button>
                        </div>
                        <div id="quiz-content" class="quiz-card shadow-2xl"></div>
                    </div>
                </div>
                <div class="h-48"></div> 
            </main>
        </div>

        <!-- Footer: Player e Velocidade -->
        <footer class="control-bar px-6 shrink-0 z-10 shadow-2xl">
            <div class="max-w-4xl mx-auto flex flex-row items-center justify-between gap-4">
                
                <!-- Controles de Reprodução (Botão de Play Menor) -->
                <div class="flex items-center gap-6">
                    <button id="prevBtn" class="p-1 opacity-50 hover:opacity-100 transition-opacity">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M8.445 14.832A1 1 0 0010 14v-2.798l5.445 3.63A1 1 0 0017 14V6a1 1 0 00-1.555-.832L10 8.798V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z"/></svg>
                    </button>
                    
                    <button id="playPauseBtn" class="bg-amber-500 text-black p-2.5 rounded-full hover:bg-amber-400 shadow-xl transition-all active:scale-90">
                        <svg id="playIcon" class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M4.018 14L14.41 8 4.018 2z"/></svg>
                        <svg id="pauseIcon" class="w-7 h-7 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M6 4h4v12H6V4zm6 0h4v12h-4V4z"/></svg>
                    </button>

                    <button id="nextBtn" class="p-1 opacity-50 hover:opacity-100 transition-opacity">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M11.555 14.832A1 1 0 0110 14v-2.798l-5.445 3.63A1 1 0 013 14V6a1 1 0 011.555-.832L10 8.798V6a1 1 0 011.555-.832l6 4a1 1 0 010 1.664l-6 4z" transform="rotate(180 10 10)"/></svg>
                    </button>
                </div>

                <!-- Seletor de Velocidade -->
                <div class="flex items-center gap-3 bg-black/10 px-3 py-2 rounded-xl border border-white/5">
                    <span class="text-[9px] font-bold opacity-50 uppercase tracking-widest hidden xs:block">Velocidade</span>
                    <select id="speedSelect" class="bg-amber-500 text-black font-black rounded-lg px-2 py-1 text-sm cursor-pointer outline-none">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2.0x</option>
                        <option value="2.5">2.5x</option>
                        <option value="3">3.0x</option>
                        <option value="3.5">3.5x</option>
                        <option value="4">4.0x</option>
                    </select>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const curriculum = [
            {
                module: "Módulo 01: Introdução",
                topics: [
                    { 
                        title: "Fundamentos de Estudo Ativo", 
                        content: "O áudio agora está configurado para buscar especificamente a voz brasileira, ignorando o sotaque de Portugal. O estudo otimizado requer ferramentas que utilizem a codificação dual do cérebro. Ao ouvir e ler simultaneamente no StudyFlow, a tua retenção de conteúdo na faculdade será muito maior. Podes ajustar a velocidade até quatro vezes e alternar entre os modos dia e noite para maior conforto.",
                        questions: [
                            { q: "Qual o sotaque configurado como prioritário?", options: ["Português de Portugal", "Português do Brasil", "Espanhol", "Inglês"], correct: 1, explanation: "O código busca vozes brasileiras (pt-BR) como prioridade no sistema de síntese de voz." },
                            { q: "Qual o limite de velocidade disponível?", options: ["2.0x", "3.0x", "4.0x", "5.0x"], correct: 2, explanation: "O StudyFlow permite acelerar a leitura até 4.0x para revisões ultra-rápidas." }
                        ]
                    }
                ]
            }
        ];

        let currentModuleIdx = 0, currentTopicIdx = 0, zoomLevel = 1.15, isPlaying = false, utterance = null, currentSentences = [], currentSentenceIdx = 0, quizIndex = 0, quizScore = 0, quizAnswered = false;
        let selectedVoice = null;

        // MOTOR DE VOZ BRASILEIRA
        function findBrazilianVoice() {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) return null;

            const targetNames = ['Luciana', 'Daniel', 'Joana', 'Felipe', 'Maria', 'Google português do Brasil'];
            let bestVoice = voices.find(v => targetNames.some(name => v.name.includes(name)) && (v.lang.includes('BR') || v.lang === 'pt-BR'));

            if (!bestVoice) bestVoice = voices.find(v => v.lang === 'pt-BR' || v.lang === 'pt_BR');
            if (!bestVoice) bestVoice = voices.find(v => v.lang.startsWith('pt') && !v.lang.includes('PT'));

            return bestVoice;
        }

        function loadVoices() {
            selectedVoice = findBrazilianVoice();
        }

        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }

        const textBody = document.getElementById('text-body'), topicTitle = document.getElementById('topic-title'), moduleList = document.getElementById('module-list'), playPauseBtn = document.getElementById('playPauseBtn'), speedSelect = document.getElementById('speedSelect'), playIcon = document.getElementById('playIcon'), pauseIcon = document.getElementById('pauseIcon'), startQuizBtn = document.getElementById('startQuizBtn');

        function init() {
            loadVoices();
            renderSidebar();
            loadTopic(0, 0);
            applyZoom();
            
            playPauseBtn.onclick = toggleSpeech;
            document.getElementById('prevBtn').onclick = prevTopic;
            document.getElementById('nextBtn').onclick = nextTopic;
            document.getElementById('menuBtn').onclick = () => {
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.toggle('hidden');
                if(!sidebar.classList.contains('hidden')) {
                    sidebar.style.position = 'fixed'; sidebar.style.zIndex = '50'; sidebar.style.height = '100dvh';
                }
            };
            startQuizBtn.onclick = startQuiz;
            
            // Lógica de velocidade aprimorada: reinicia frase atual na nova velocidade
            speedSelect.onchange = () => { 
                if(isPlaying) { 
                    const idx = currentSentenceIdx; 
                    stopSpeech(); 
                    startSpeech(idx); 
                } 
            };
        }

        function setTheme(mode) {
            if (mode === 'day') document.body.classList.add('theme-day');
            else document.body.classList.remove('theme-day');
        }

        function renderSidebar() {
            moduleList.innerHTML = '';
            curriculum.forEach((mod, mIdx) => {
                const modDiv = document.createElement('div');
                modDiv.className = 'mb-6';
                modDiv.innerHTML = `<h3 class="text-[10px] font-black opacity-30 mb-2 tracking-widest uppercase">${mod.module}</h3>`;
                const ul = document.createElement('ul');
                ul.className = 'space-y-1 border-l border-white/5 ml-1';
                mod.topics.forEach((top, tIdx) => {
                    const li = document.createElement('li');
                    const isActive = mIdx === currentModuleIdx && tIdx === currentTopicIdx;
                    li.className = `cursor-pointer text-xs p-2 rounded-r-lg ${isActive ? 'text-amber-500 bg-amber-500/10 border-l-2 border-amber-500 font-bold' : 'opacity-60 hover:bg-black/5'}`;
                    li.innerText = top.title;
                    li.onclick = () => { exitQuiz(); loadTopic(mIdx, tIdx); };
                    ul.appendChild(li);
                });
                modDiv.appendChild(ul);
                moduleList.appendChild(modDiv);
            });
        }

        function loadTopic(mIdx, tIdx) {
            stopSpeech();
            currentModuleIdx = mIdx; currentTopicIdx = tIdx;
            const topic = curriculum[mIdx].topics[tIdx];
            topicTitle.innerText = topic.title;
            currentSentences = topic.content.match(/[^\.!\?]+[\.!\?]+/g) || [topic.content];
            textBody.innerHTML = '';
            currentSentences.forEach((sentence, idx) => {
                const span = document.createElement('span');
                span.id = `sentence-${idx}`; span.className = 'sentence-item mr-1';
                span.innerText = sentence.trim() + ' ';
                span.onclick = () => { stopSpeech(); startSpeech(idx); };
                textBody.appendChild(span);
            });
            currentSentenceIdx = 0;
            renderSidebar();
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('reader-scroll').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function startQuiz() {
            stopSpeech();
            document.getElementById('reading-area').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            quizIndex = 0; quizScore = 0; showQuestion();
        }

        function exitQuiz() {
            document.getElementById('reading-area').classList.remove('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
        }

        function showQuestion() {
            const topic = curriculum[currentModuleIdx].topics[currentTopicIdx];
            const quizContent = document.getElementById('quiz-content');
            quizAnswered = false;
            if (!topic.questions || topic.questions.length === 0) { quizContent.innerHTML = "<p>Sem simulado disponível.</p>"; return; }
            if (quizIndex >= topic.questions.length) { showQuizResult(); return; }
            const qData = topic.questions[quizIndex];
            quizContent.innerHTML = `
                <h3 class="text-lg font-bold mb-4">${qData.q}</h3>
                <div class="space-y-2">${qData.options.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(${i})">${opt}</button>`).join('')}</div>
                <div id="quiz-feedback" class="mt-4 hidden p-3 rounded bg-black/5 border border-white/5">
                    <p id="feedback-text" class="font-bold mb-1"></p>
                    <p class="text-xs opacity-70 italic">${qData.explanation}</p>
                    <button onclick="nextQuestion()" class="mt-4 w-full bg-amber-500 text-black py-2 rounded-lg font-bold">PRÓXIMA</button>
                </div>`;
        }

        function checkAnswer(selectedIdx) {
            if (quizAnswered) return;
            quizAnswered = true;
            const qData = curriculum[currentModuleIdx].topics[currentTopicIdx].questions[quizIndex];
            document.querySelectorAll('.option-btn').forEach((btn, i) => {
                btn.disabled = true;
                if (i === qData.correct) btn.classList.add('correct');
                else if (i === selectedIdx) btn.classList.add('incorrect');
            });
            if (selectedIdx === qData.correct) { quizScore++; document.getElementById('feedback-text').innerText = "✓ Correto!"; }
            else { document.getElementById('feedback-text').innerText = "✕ Incorreto"; }
            document.getElementById('quiz-feedback').classList.remove('hidden');
        }

        function nextQuestion() { quizIndex++; showQuestion(); }

        function showQuizResult() {
            const total = curriculum[currentModuleIdx].topics[currentTopicIdx].questions.length;
            document.getElementById('quiz-content').innerHTML = `<div class="text-center py-6"><h3 class="text-xl font-bold">Fim do Teste</h3><div class="text-5xl font-black text-amber-500 my-4">${Math.round((quizScore/total)*100)}%</div><p class="mb-6 opacity-60">Acertos: ${quizScore}/${total}</p><button onclick="exitQuiz()" class="bg-amber-500 text-black px-10 py-3 rounded-xl font-bold shadow-lg">CONCLUIR</button></div>`;
        }

        function toggleSpeech() { isPlaying ? pauseSpeech() : startSpeech(currentSentenceIdx); }
        function startSpeech(startIndex) {
            if (window.speechSynthesis.paused && utterance) { window.speechSynthesis.resume(); isPlaying = true; updateIcons(); return; }
            stopSpeech(); isPlaying = true; updateIcons(); readSentence(startIndex);
        }
        function readSentence(index) {
            if (index >= currentSentences.length) { stopSpeech(); return; }
            currentSentenceIdx = index;
            document.querySelectorAll('.sentence-item').forEach(s => s.classList.remove('highlight'));
            const activeSpan = document.getElementById(`sentence-${index}`);
            if(activeSpan) { activeSpan.classList.add('highlight'); activeSpan.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            
            window.speechSynthesis.cancel();
            utterance = new SpeechSynthesisUtterance(currentSentences[index]);
            if (!selectedVoice) selectedVoice = findBrazilianVoice();
            if (selectedVoice) utterance.voice = selectedVoice;
            utterance.lang = 'pt-BR';
            utterance.rate = parseFloat(speedSelect.value);
            utterance.onend = () => { if (isPlaying) readSentence(index + 1); };
            window.speechSynthesis.speak(utterance);
        }
        function pauseSpeech() { window.speechSynthesis.pause(); isPlaying = false; updateIcons(); }
        function stopSpeech() { window.speechSynthesis.cancel(); isPlaying = false; updateIcons(); }
        function updateIcons() { playIcon.classList.toggle('hidden', isPlaying); pauseIcon.classList.toggle('hidden', !isPlaying); }
        function nextTopic() { if (currentTopicIdx < curriculum[currentModuleIdx].topics.length - 1) loadTopic(currentModuleIdx, currentTopicIdx + 1); else if (currentModuleIdx < curriculum.length - 1) loadTopic(currentModuleIdx + 1, 0); }
        function prevTopic() { if (currentTopicIdx > 0) loadTopic(currentModuleIdx, currentTopicIdx - 1); else if (currentModuleIdx > 0) loadTopic(currentModuleIdx - 1, curriculum[currentModuleIdx-1].topics.length - 1); }
        function applyZoom() { document.getElementById('content-display').style.fontSize = `${zoomLevel}rem`; }
        function changeZoom(delta) { zoomLevel = Math.min(Math.max(zoomLevel + delta, 0.7), 3.0); applyZoom(); }

        window.onload = init;
    </script>
</body>
</html>
